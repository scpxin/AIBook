<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄小说</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
        .header{background:linear-gradient(135deg,#ff6b35,#ff4444);color:#fff;padding:24px 20px;text-align:center}
        .header h1{font-size:22px;margin-bottom:4px}
        .header p{opacity:.85;font-size:12px}
        .tabs{display:flex;max-width:720px;margin:12px auto 0;padding:0 16px;gap:4px}
        .tab{flex:1;padding:10px;text-align:center;background:#fff;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:#888;border-bottom:3px solid transparent;transition:.2s}
        .tab.active{color:#ff6b35;border-bottom-color:#ff6b35}
        .tab:hover{color:#ff6b35}
        .container{max-width:720px;margin:0 auto;padding:0 16px 20px}
        .panel{display:none}
        .panel.active{display:block}
        .card{background:#fff;border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .card h2{font-size:15px;margin-bottom:10px;color:#333}
        .search-box{display:flex;gap:8px;margin-bottom:6px}
        .search-box input{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:6px;font-size:14px;outline:none}
        .search-box input:focus{border-color:#ff6b35}
        .search-box button{padding:10px 20px;background:linear-gradient(135deg,#ff6b35,#ff4444);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
        .search-box button:disabled{opacity:.6;cursor:not-allowed}
        .book-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border:2px solid #f0f0f0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.2s}
        .book-item:hover{border-color:#ff6b35;background:#fff8f6}
        .book-item.selected{border-color:#ff6b35;background:#fff3ee}
        .book-title{font-size:14px;font-weight:600;color:#222}
        .book-meta{font-size:11px;color:#888;margin-top:2px}
        .book-count{font-size:11px;color:#ff6b35;font-weight:600;white-space:nowrap}
        .empty{text-align:center;color:#999;padding:24px;font-size:12px}
        .btn{border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;padding:7px 16px;color:#fff;display:inline-flex;align-items:center;gap:5px}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-dl{background:linear-gradient(135deg,#11998e,#38ef7d)}
        .btn-pause{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .btn-resume{background:linear-gradient(135deg,#4facfe,#00f2fe)}
        .btn-ai{background:linear-gradient(135deg,#667eea,#764ba2)}
        .btn-save{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .btn-ghost{background:#f0f0f0;color:#555}
        .progress{margin-top:10px}
        .progress-top{display:flex;justify-content:space-between;margin-bottom:4px}
        .progress-label{font-size:11px;color:#666}
        .progress-pct{font-size:15px;font-weight:700;color:#11998e}
        .progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:6px}
        .progress-fill{height:100%;background:linear-gradient(90deg,#11998e,#38ef7d);border-radius:3px;transition:width .3s;width:0}
        .progress-detail{display:flex;gap:12px;font-size:10px;color:#888;flex-wrap:wrap}
        .spinner{display:inline-block;width:10px;height:10px;border:2px solid #fff3;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
.novel-steps{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.novel-step{padding:5px 10px;border-radius:15px;font-size:11px;background:#f0f0f0;color:#888;cursor:pointer;transition:.2s}
.novel-step.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.novel-step.done{background:#38ef7d;color:#fff}
.inspire-option{padding:8px 12px;border:2px solid #e0e0e0;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:12px;transition:.2s}
.inspire-option:hover{border-color:#667eea;background:#f0f3ff}
.inspire-option.selected{border-color:#667eae;background:#e8edfe}
.world-block{background:#f8f9fa;border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px;line-height:1.6}
.world-block h4{font-size:12px;color:#667eea;margin-bottom:4px}
.char-card{background:#f8f9fa;border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px}
.char-card .char-name{font-weight:700;color:#333;margin-bottom:2px}
.char-card .char-type{font-size:10px;color:#667eea;display:inline-block;padding:1px 6px;background:#e8edfe;border-radius:8px;margin-bottom:4px}
.outline-item{padding:10px;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:6px;font-size:12px}
.outline-item .outline-title{font-weight:700;color:#333;margin-bottom:4px}
.chapter-content{background:#f8f9fa;border-radius:6px;padding:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;margin-top:8px}
.novel-btn-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
        .tip{font-size:10px;color:#aaa;margin-top:3px;line-height:1.5}
        .error{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:8px;border-radius:5px;margin-top:8px;font-size:11px}
        .success{background:#d4edda;border:1px solid #c3e6cb;color:#155724;padding:8px;border-radius:5px;margin-top:8px;font-size:11px}
        .settings-icon{position:absolute;top:10px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:#fff;opacity:.8}
        .settings-icon:hover{opacity:1}
        .header{position:relative}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center}
        .modal-card{background:#fff;border-radius:10px;padding:18px;min-width:300px;max-width:440px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
        .modal-card h3{font-size:15px;margin-bottom:10px}
        .modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#999;margin-top:-2px}
        .model-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border:1px solid #eee;border-radius:5px;margin-bottom:5px}
        .model-item.selected{border-color:#667eea;background:#f0eeff}
        .model-name{font-weight:600;font-size:12px}
        .model-endpoint{font-size:9px;color:#888}
        .model-act-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px}
        .model-act-btn.sel{color:#11998e}
        .model-act-btn.del{color:#e74c3c}
        .add-model-btn{width:100%;padding:7px;border:2px dashed #ddd;border-radius:5px;background:none;cursor:pointer;font-size:12px;color:#888;margin-top:5px}
        .add-model-btn:hover{border-color:#667eea;color:#667eea}
        .form-group{margin-bottom:8px}
        .form-group label{display:block;font-size:11px;font-weight:600;margin-bottom:2px;color:#555}
        .form-group input{width:100%;padding:7px;border:1px solid #ddd;border-radius:4px;font-size:12px}
        .preset-btns{display:flex;flex-direction:column;gap:4px;margin-top:6px}
        .preset-btn{text-align:left;padding:7px 10px;font-size:12px}
        .style-profile{background:#f8f9fa;border-radius:5px;padding:12px}
        .style-profile h4{font-size:13px;color:#333;margin:8px 0 3px}
        .style-profile p{font-size:11px;color:#555;line-height:1.6;margin-bottom:2px}
        .gen-form{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .gen-form .full{grid-column:1/-1}
        .gen-form label{font-size:11px;font-weight:600;color:#555;display:block;margin-bottom:2px}
        .gen-form input,.gen-form textarea,.gen-form select{width:100%;padding:7px;border:1px solid #ddd;border-radius:4px;font-size:12px;font-family:inherit}
        .gen-form textarea{resize:vertical;min-height:50px}
        .select-row{display:flex;align-items:center;gap:5px;margin-bottom:8px}
        .select-row select{flex:1;padding:7px;border:1px solid #ddd;border-radius:4px;font-size:12px}
        .text-area{width:100%;min-height:120px;padding:10px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit;resize:vertical}
        .source-tabs{display:flex;gap:4px;margin-bottom:8px}
        .source-tab{padding:5px 12px;font-size:11px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#fff;color:#666}
        .source-tab.active{background:#667eea;color:#fff;border-color:#667eea}
    </style>
</head>
<body>

<div class="header">
    <h1>番茄小说</h1>
    <p>小说下载 · AI创作</p>
    <button class="settings-icon" id="settingsBtn">&#9881;</button>
</div>

<div class="tabs">
    <div class="tab active" id="tab0">小说下载</div>
    <div class="tab" id="tab1">AI创作</div>
</div>

<div class="container">
<!-- Panel 0: 小说下载 -->
<div class="panel active" id="panel-0">
    <div class="card">
        <h2>搜索书籍</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="书名 / 章节链接 / book_id">
            <button id="searchBtn">搜索</button>
        </div>
        <div class="tip">输入书名、粘贴链接或直接输入 book_id</div>
        <div id="results"></div>
    </div>

    <div class="card" id="bookSection" style="display:none">
        <h2 id="bookTitle">书籍信息</h2>
        <div style="font-size:11px;color:#888;margin-bottom:10px" id="bookMeta"></div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
            <button class="btn btn-dl" id="btnDownload">下载 TXT</button>
            <button class="btn" style="background:#f0f0f0;color:#555" id="btnReset">重新搜索</button>
        </div>
        <div id="downloadStatus"></div>
    </div>
</div>

<!-- Panel 1: AI创作 -->
<div class="panel" id="panel-1">
    <!-- AI 小说创作 -->
    <div class="card">
        <h2>AI 小说创作</h2>
        <div class="tip" style="margin-bottom:8px">从灵感到大纲到章节，AI 辅助完成小说创作全流程。</div>

        <!-- 步骤指示器 -->
        <div class="novel-steps">
            <div class="novel-step active" id="step0"><span>1.灵感</span></div>
            <div class="novel-step" id="step1"><span>2.世界观</span></div>
            <div class="novel-step" id="step2"><span>3.角色</span></div>
            <div class="novel-step" id="step3"><span>4.大纲</span></div>
            <div class="novel-step" id="step4"><span>5.章节</span></div>
        </div>

        <!-- Step 0: 灵感 -->
        <div class="novel-step-content" id="novelStep0">
            <div class="select-row" style="margin-bottom:8px">
                <select id="novelModel"></select>
                <button class="btn btn-ai" id="btnNovelInspire">生成灵感</button>
            </div>
            <div class="form-group" style="margin-bottom:6px"><label>参考输入（可选）</label><input id="novelUserInput" placeholder="输入你的想法、关键词..."></div>
            <div id="inspireResults"></div>
            <div id="inspireSelected" style="margin-top:8px"></div>
            <div class="select-row" style="margin-top:8px">
                <input id="novelTitle" placeholder="书名" style="flex:1;padding:8px 12px;border:2px solid #e0e0e0;border-radius:6px;font-size:13px">
                <input id="novelDesc" placeholder="简介" style="flex:1;padding:8px 12px;border:2px solid #e0e0e0;border-radius:6px;font-size:13px">
            </div>
            <div class="select-row" style="margin-top:6px">
                <input id="novelTheme" placeholder="主题" style="flex:1;padding:8px 12px;border:2px solid #e0e0e0;border-radius:6px;font-size:13px">
                <input id="novelGenre" placeholder="类型" style="flex:1;padding:8px 12px;border:2px solid #e0e0e0;border-radius:6px;font-size:13px">
            </div>
            <div style="margin-top:8px"><button class="btn btn-dl" id="btnToWorld" disabled>下一步：构建世界观</button></div>
        </div>

        <!-- Step 1: 世界观 -->
        <div class="novel-step-content" id="novelStep1" style="display:none">
            <div id="worldResult"></div>
            <div style="margin-top:8px"><button class="btn btn-dl" id="btnToChars" disabled>下一步：生成角色</button></div>
        </div>

        <!-- Step 2: 角色 -->
        <div class="novel-step-content" id="novelStep2" style="display:none">
            <div class="select-row" style="margin-bottom:8px">
                <input id="novelCharCount" type="number" value="6" min="3" max="15" style="width:80px;padding:8px;border:2px solid #e0e0e0;border-radius:6px">
                <button class="btn btn-ai" id="btnGenChars">生成角色</button>
            </div>
            <div id="charsResult"></div>
            <div style="margin-top:8px"><button class="btn btn-dl" id="btnToOutline" disabled>下一步：生成大纲</button></div>
        </div>

        <!-- Step 3: 大纲 -->
        <div class="novel-step-content" id="novelStep3" style="display:none">
            <div class="select-row" style="margin-bottom:8px">
                <input id="novelChapterCount" type="number" value="3" min="1" max="20" style="width:80px;padding:8px;border:2px solid #e0e0e0;border-radius:6px">
                <select id="novelPerspective"><option>第三人称</option><option>第一人称</option></select>
                <button class="btn btn-ai" id="btnGenOutline">生成大纲</button>
            </div>
            <div id="outlineResult"></div>
            <div style="margin-top:8px"><button class="btn btn-dl" id="btnToChapters" disabled>下一步：生成章节</button></div>
        </div>

        <!-- Step 4: 章节 -->
        <div class="novel-step-content" id="novelStep4" style="display:none">
            <div class="select-row" style="margin-bottom:8px">
                <input id="novelTargetWords" type="number" value="3000" min="500" max="10000" step="500" style="width:100px;padding:8px;border:2px solid #e0e0e0;border-radius:6px">
                <button class="btn btn-ai" id="btnGenChapter">生成下一章</button>
                <button class="btn btn-save" id="btnGenAllChapters">一键生成全部</button>
            </div>
            <div id="chapterProgress"></div>
            <div id="chaptersResult"></div>
        </div>
    </div>

    <!-- AI 风格分析 -->
    <div class="card">
        <h2>AI 风格分析</h2>
        <div class="tip" style="margin-bottom:8px">分析小说的写作风格，为AI仿写提供风格画像。</div>
        <div class="source-tabs">
            <div class="source-tab active" id="srcTabPaste">粘贴文本</div>
            <div class="source-tab" id="srcTabSaved">已下载书籍</div>
        </div>
        <div id="srcPaste">
            <textarea id="analyzeText" class="text-area" placeholder="粘贴小说文本内容（至少几百字），AI将分析其写作风格..."></textarea>
        </div>
        <div id="srcSaved" style="display:none">
            <div id="savedBooksList" style="margin-bottom:8px"></div>
            <div id="savedBookContent" style="display:none">
                <div style="font-size:11px;color:#888;margin-bottom:4px" id="savedBookMeta"></div>
                <textarea id="savedTextArea" class="text-area" style="min-height:100px" readonly></textarea>
            </div>
        </div>
        <div class="select-row" style="margin-top:8px">
            <select id="analyzeModel"></select>
            <button class="btn btn-ai" id="btnRunAnalyze">分析</button>
        </div>
        <div id="analyzeResult"></div>
    </div>

    <div class="card" id="generateSection" style="display:none">
        <h2>AI 仿写生成</h2>
        <div class="select-row">
            <select id="generateModel"></select>
        </div>
        <div class="gen-form" id="genForm">
            <div><label>题材类型</label><input id="gfGenre" placeholder="悬疑 / 玄幻..."></div>
            <div><label>生成章节数</label><input id="gfCount" type="number" value="3" min="1" max="20"></div>
            <div class="full"><label>主角设定</label><input id="gfProtagonist" placeholder="姓名、年龄、身份..."></div>
            <div class="full"><label>世界观</label><textarea id="gfWorld" placeholder="时代背景、势力分布..."></textarea></div>
            <div class="full"><label>故事梗概</label><textarea id="gfOutline" placeholder="主线剧情..."></textarea></div>
        </div>
        <div style="margin-top:8px"><button class="btn btn-ai" id="btnGenerate">生成</button></div>
        <div id="generateResult"></div>
    </div>
</div>
</div>

<!-- Settings Modal -->
<div id="settingsOverlay" class="modal-overlay" style="display:none">
    <div class="modal-card">
        <button class="modal-close" id="settingsClose">&times;</button>
        <h3>大模型配置</h3>
        <div id="modelList"></div>
        <button class="add-model-btn" id="showAddModelBtn">+ 添加模型</button>
        <div id="modelForm" style="display:none">
            <div class="form-group"><label>模型名称</label><input id="mfName" placeholder="如: DeepSeek V3"></div>
            <div class="form-group"><label>API 地址</label><input id="mfEndpoint" placeholder="https://api.deepseek.com/v1/chat/completions"></div>
            <div class="form-group"><label>API Key</label><input id="mfKey" type="password" placeholder="sk-xxx"></div>
            <div class="form-group"><label>模型标识</label><input id="mfModel" placeholder="deepseek-chat"></div>
            <div style="display:flex;gap:6px;margin-top:8px">
                <button class="btn btn-dl" id="saveModelBtn" style="flex:1">保存</button>
                <button class="btn" id="hideModelFormBtn" style="flex:1;background:#ccc">取消</button>
            </div>
        </div>
        <div class="preset-btns">
            <button class="add-model-btn preset-btn" data-name="智谱 GLM-4-Flash" data-endpoint="https://open.bigmodel.cn/api/paas/v4/chat/completions" data-model="glm-4-flash">智谱 GLM-4-Flash（免费）</button>
            <button class="add-model-btn preset-btn" data-name="DeepSeek V3" data-endpoint="https://api.deepseek.com/v1/chat/completions" data-model="deepseek-chat">DeepSeek V3</button>
            <button class="add-model-btn preset-btn" data-name="通义千问 Turbo" data-endpoint="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions" data-model="qwen-turbo">通义千问 Turbo</button>
        </div>
    </div>
</div>

<script>
(function(){
"use strict";

var BASE = "/fanqie";
var book = null, ids = [], state = "idle", current = 0, total = 0;
var startedAt = 0, sessionId = null, contentParts = [];
var models = [];

function $(id){ return document.getElementById(id); }

function api(path, params) {
    var url = BASE + path;
    if (params) {
        var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }).join("&");
        url += (url.indexOf("?")===-1?"?":"&") + qs;
    }
    return fetch(url).then(function(r){
        if (!r.ok) return r.json().then(function(d){ throw new Error(d.error || "HTTP "+r.status); });
        return r.json();
    });
}

function apiPost(path, body) {
    return fetch(BASE + path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)}).then(function(r){
        if (!r.ok) return r.json().then(function(d){ throw new Error(d.error || "HTTP "+r.status); });
        return r.json();
    });
}

function escHtml(s){ var d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

// ====== Tab switching ======
document.getElementById("tab0").onclick = function(){
    document.getElementById("tab0").classList.add("active");
    document.getElementById("tab1").classList.remove("active");
    document.getElementById("panel-0").classList.add("active");
    document.getElementById("panel-1").classList.remove("active");
};
document.getElementById("tab1").onclick = function(){
    document.getElementById("tab1").classList.add("active");
    document.getElementById("tab0").classList.remove("active");
    document.getElementById("panel-1").classList.add("active");
    document.getElementById("panel-0").classList.remove("active");
    updateModelSelects();
};

// ====== 搜索 ======
function doSearch() {
    var q = $("searchInput").value.trim();
    if (!q) return;
    var btn = $("searchBtn");
    btn.disabled = true;
    btn.innerHTML = "<span class=\"spinner\"></span>...";
    $("results").innerHTML = "";
    $("bookSection").style.display = "none";

    var idMatch = q.match(/(\d{16,20})/);
    if (idMatch) {
        api("/api/resolve", {q: q}).then(function(info){
            if (info && info.book_id) {
                book = info;
                btn.disabled = false; btn.textContent = "搜索";
                showBook();
            } else {
                $("results").innerHTML = "<div class=\"empty\">无法识别</div>";
                btn.disabled = false; btn.textContent = "搜索";
            }
        }).catch(function(e){
            $("results").innerHTML = "<div class=\"error\">"+e.message+"</div>";
            btn.disabled = false; btn.textContent = "搜索";
        });
        return;
    }

    api("/api/search", {q: q}).then(function(data){
        var list = data.books || [];
        if (!list.length) { $("results").innerHTML = "<div class=\"empty\">未找到结果</div>"; btn.disabled=false; btn.textContent="搜索"; return; }
        renderResults(list);
        btn.disabled = false; btn.textContent = "搜索";
    }).catch(function(e){
        $("results").innerHTML = "<div class=\"error\">搜索失败: "+e.message+"</div>";
        btn.disabled = false; btn.textContent = "搜索";
    });
}

$("searchBtn").onclick = doSearch;
$("searchInput").addEventListener("keydown", function(e){ if(e.key==="Enter") doSearch(); });
$("btnReset").onclick = function(){
    $("bookSection").style.display = "none";
    $("results").innerHTML = "";
    $("searchInput").value = "";

// ====== 下载 ======
$("btnDownload").onclick = function(){
    if (!book || state === "running") return;
    if (state === "paused" && sessionId) { doResume(); return; }
    state = "running"; current = 0;
    startedAt = Date.now();
    updateDownloadUI();
    api("/api/download/start", {book_id: book.book_id, title: book.title}).then(function(d){
        sessionId = d.session_id;
        pollDownload();
    }).catch(function(e){
        state = "idle"; updateDownloadUI();
        $("downloadStatus").innerHTML = "<div class=\"error\">启动下载失败: "+e.message+"</div>";
    });
};

function pollDownload() {
    if (!sessionId || state === "idle") return;
    api("/api/download/status", {session_id: sessionId}).then(function(d){
        current = d.current; total = d.total;
        updateDownloadUI();
        if (d.status === "done") { state = "done"; updateDownloadUI(); showComplete(); }
        else if (d.status === "downloading") setTimeout(pollDownload, 1000);
        else if (d.status === "paused") { state = "paused"; updateDownloadUI(); }
        else if (d.status === "error") { state = "error"; updateDownloadUI(); }
    }).catch(function(){ setTimeout(pollDownload, 2000); });
}

function doPause() {
    if (!sessionId) return;
    api("/api/download/pause", {session_id: sessionId}).then(function(){ state = "paused"; updateDownloadUI(); });
}

function doResume() {
    if (!sessionId) return;
    api("/api/download/resume", {session_id: sessionId}).then(function(){ state = "running"; updateDownloadUI(); pollDownload(); });
}

function updateDownloadUI() {
    var pct = total > 0 ? Math.round(current/total*100) : 0;
    var st = "";
    if (state === "idle") st = "点击下方按钮开始";
    else if (state === "running") st = "下载中 " + pct + "%";
    else if (state === "paused") st = "已暂停 " + pct + "%";
    else if (state === "done") st = "下载完成!";
    else if (state === "error") st = "下载失败";
    var btns = "";
    if (state === "idle" || state === "done") btns = "<button class=\"btn btn-dl\" id=\"btnDl2\">" + (state==="done"?"重新下载":"开始下载") + "</button>";
    else if (state === "running") btns = "<button class=\"btn btn-pause\" id=\"btnPause2\">暂停</button>";
    else if (state === "paused") btns = "<button class=\"btn btn-resume\" id=\"btnResume2\">继续</button> <button class=\"btn btn-save\" id=\"btnSave2\">保存</button>";

    var html = "<div class=\"progress\"><div class=\"progress-top\"><span class=\"progress-label\">"+st+"</span><span class=\"progress-pct\">"+pct+"%</span></div>" +
        "<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:"+pct+"%\"></div></div>" +
        "<div class=\"progress-detail\"><span>"+current+"/"+total+" 章</span></div></div>";
    if (btns) html += "<div style=\"margin-top:6px\">"+btns+"</div>";
    $("downloadStatus").innerHTML = html;

    // Re-bind dynamic buttons
    var dl2 = $("btnDl2"); if (dl2) dl2.onclick = window.startDownloadClick;
    var p2 = $("btnPause2"); if (p2) p2.onclick = doPause;
    var r2 = $("btnResume2"); if (r2) r2.onclick = doResume;
    var s2 = $("btnSave2"); if (s2) s2.onclick = saveFile;

    if (state === "running") { $("btnDownload").textContent = "下载中..."; $("btnDownload").disabled = true; }
    else { $("btnDownload").textContent = "下载 TXT"; $("btnDownload").disabled = false; }
}

function showComplete() {
    updateDownloadUI();
    $("btnDownload").textContent = "下载 TXT"; $("btnDownload").disabled = false;
    $("downloadStatus").innerHTML += "<div class=\"success\">下载完成! <button class=\"btn btn-dl\" id=\"btnSave3\" style=\"margin-left:5px\">保存文件</button></div>";

        var h = "";
        if (chapters.length) {
            for (var i=0;i<chapters.length;i++){
                h += "<div class=\"chapter-card\"><h4>"+escHtml(chapters[i].title)+" ("+chapters[i].text.length+"字)</h4><p>"+escHtml(chapters[i].text)+"</p></div>";
            }
        } else {

        $("btnGenerate").disabled = false;
    });

function parseChapters(text) {
    var chapters = [], re = /第([\u4e00-\u9fa5\d]+)章\s*(.*?)(?:\n|$)/g, match, lastIdx = 0;
    while ((match = re.exec(text)) !== null) {
        if (lastIdx > 0) chapters[chapters.length-1].text = text.slice(lastIdx, match.index).trim();
        chapters.push({title:"第"+match[1]+"章"+(match[2]?" "+match[2]:""), text:""});
        lastIdx = match.index + match[0].length;
    }
    if (chapters.length && lastIdx < text.length) chapters[chapters.length-1].text = text.slice(lastIdx).trim();
    return chapters;
}

function saveGenerated() {
    var text = window._generatedNovel || "";
    if (!text) return;
    var blob = new Blob(["\uFEFF"+text], {type:"text/plain;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "AI仿写.txt";
    a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href)}, 2000);
}

    .finally(function() { btn.disabled = false; btn.innerHTML = "生成灵感"; });
};

// 世界观
$("btnToWorld").onclick = function() {
    var m = getNovelModel();
    if (!m) { alert("请先配置AI模型"); return; }
    novelState.title = $("novelTitle").value.trim();
    novelState.description = $("novelDesc").value.trim();
    novelState.theme = $("novelTheme").value.trim();
    novelState.genre = $("novelGenre").value.trim();
    if (!novelState.title) { alert("请输入书名"); return; }

    showNovelStep(1);
    var r = $("worldResult"); r.innerHTML = "<div class=\"empty\"><span class=\"spinner\"></span> 正在构建世界观...</div>";
    apiPost("/api/novel/worldbuilding", {endpoint: m.endpoint, apiKey: m.apiKey, model: m.model, title: novelState.title, theme: novelState.theme, genre: novelState.genre, description: novelState.description})
    .then(function(d) {
        novelState.world = d;
        var html = "";
        var labels = {time_period: "时间背景", location: "空间环境", atmosphere: "情感基调", rules: "世界规则"};
        Object.keys(labels).forEach(function(k) {
            if (d[k]) html += "<div class=\"world-block\"><h4>" + labels[k] + "</h4>" + escHtml(d[k]) + "</div>";
        });
        html += "<div class=\"novel-btn-row\"><button class=\"btn btn-ghost\" id=\"btnEditWorld\">编辑世界观</button></div>";
        r.innerHTML = html;
        $("btnToChars").disabled = false;
    })
    .catch(function(e) { r.innerHTML = "<div class=\"error\">生成失败: " + escHtml(e.message) + "</div>"; });
};

// 角色
$("btnToChars").onclick = function() {
    showNovelStep(2);
};
$("btnGenChars").onclick = function() {
    var m = getNovelModel();
    if (!m) { alert("请先配置AI模型"); return; }
    var count = parseInt($("novelCharCount").value) || 6;
    var r = $("charsResult"); r.innerHTML = "<div class=\"empty\"><span class=\"spinner\"></span> 正在生成角色...</div>";
    apiPost("/api/novel/characters", {endpoint: m.endpoint, apiKey: m.apiKey, model: m.model, worldData: novelState.world, theme: novelState.theme, genre: novelState.genre, count: count})
    .then(function(d) {
        novelState.characters = d.characters || [];
        var html = "<div style=\"font-size:11px;color:#888;margin-bottom:4px\">已生成 " + novelState.characters.length + " 个角色：</div>";
        novelState.characters.forEach(function(c) {
            if (c.is_organization) {
                html += "<div class=\"char-card\"><span class=\"char-type\">组织</span><div class=\"char-name\">" + escHtml(c.name) + "</div><div style=\"color:#666\">" + escHtml(c.organization_purpose || "") + "</div></div>";
            } else {
                html += "<div class=\"char-card\"><span class=\"char-type\">" + escHtml(c.role_type || "角色") + "</span><div class=\"char-name\">" + escHtml(c.name) + "</div><div style=\"color:#666\">" + escHtml(c.personality || "") + "</div></div>";
            }
        });
        r.innerHTML = html;
        $("btnToOutline").disabled = false;
    })
    .catch(function(e) { r.innerHTML = "<div class=\"error\">生成失败: " + escHtml(e.message) + "</div>"; });
};

// 大纲
$("btnToOutline").onclick = function() {
    showNovelStep(3);
};
$("btnGenOutline").onclick = function() {
    var m = getNovelModel();
    if (!m) { alert("请先配置AI模型"); return; }
    var count = parseInt($("novelChapterCount").value) || 3;
    var persp = $("novelPerspective").value;
    var r = $("outlineResult"); r.innerHTML = "<div class=\"empty\"><span class=\"spinner\"></span> 正在生成大纲...</div>";
    apiPost("/api/novel/outline", {endpoint: m.endpoint, apiKey: m.apiKey, model: m.model, title: novelState.title, theme: novelState.theme, genre: novelState.genre, charactersInfo: novelState.characters, chapterCount: count, narrativePerspective: persp})
    .then(function(d) {
        novelState.outline = d.outline || [];
        novelState.currentChapter = 0;
        var html = "";
        novelState.outline.forEach(function(o, i) {
            html += "<div class=\"outline-item\"><div class=\"outline-title\">第" + o.chapter_number + "章 " + escHtml(o.title) + "</div><div style=\"color:#666\">" + escHtml(o.summary) + "</div></div>";
        });
        r.innerHTML = html;
        $("btnToChapters").disabled = false;
    })
    .catch(function(e) { r.innerHTML = "<div class=\"error\">生成失败: " + escHtml(e.message) + "</div>"; });
};

// 章节
$("btnToChapters").onclick = function() {
    showNovelStep(4);
};

$("btnGenChapter").onclick = function() {
    var m = getNovelModel();
    if (!m) { alert("请先配置AI模型"); return; }
    if (novelState.currentChapter >= novelState.outline.length) { alert("所有章节已生成完毕"); return; }
    generateOneChapter(m, novelState.currentChapter);
};

$("btnGenAllChapters").onclick = function() {
    var m = getNovelModel();
    if (!m) { alert("请先配置AI模型"); return; }
    var i = novelState.currentChapter;
    function next() {
        if (i >= novelState.outline.length) return;
        generateOneChapter(m, i, function(){ i++; next(); });
    }
    next();
};

function generateOneChapter(m, idx, cb) {
    var o = novelState.outline[idx];
    var prevSummary = idx > 0 ? (novelState.chapters[idx-1] || "").slice(0, 200) : "";
    var prevEnd = idx > 0 ? (novelState.chapters[idx-1] || "").slice(-300) : "";
    var targetWords = parseInt($("novelTargetWords").value) || 3000;

    $("chapterProgress").innerHTML = "<div class=\"empty\"><span class=\"spinner\></span> 正在生成第" + o.chapter_number + "章...</div>";

    apiPost("/api/novel/chapter", {
        endpoint: m.endpoint, apiKey: m.apiKey, model: m.model,
        projectTitle: novelState.title, genre: novelState.genre,
        chapterNumber: o.chapter_number, chapterTitle: o.title,
        chapterOutline: o.summary, continuationPoint: prevEnd,
        previousChapterSummary: prevSummary, chapterCharacters: (o.characters || []).join(", "),
        targetWordCount: targetWords, narrativePerspective: $("novelPerspective").value
    }).then(function(d) {
        novelState.chapters[idx] = d.content;
        novelState.currentChapter = idx + 1;
        renderChapterProgress();
        if (cb) cb();
    }).catch(function(e) {
        $("chapterProgress").innerHTML = "<div class=\"error\">第" + o.chapter_number + "章生成失败: " + escHtml(e.message) + "</div>";
    });
}

function renderChapterProgress() {
    var html = "<div style=\"font-size:11px;color:#888;margin-bottom:6px\">已生成 " + novelState.currentChapter + "/" + novelState.outline.length + " 章</div>";
    novelState.chapters.forEach(function(c, i) {
        html += "<div style=\"margin-bottom:6px\"><div style=\"font-weight:600;font-size:12px;margin-bottom:2px\">第" + (i+1) + "章 " + escHtml(novelState.outline[i].title) + "</div><div class=\"chapter-content\">" + escHtml(c) + "</div></div>";
    });
    $("chaptersResult").innerHTML = html;
    $("chapterProgress").innerHTML = "";
}

// 初始化小说创作模型选择
function updateNovelModelSelect() {
    var sel = $("novelModel");
    if (!sel) return;
    sel.innerHTML = models.map(function(m, i) { return "<option value=\""+i+"\">"+escHtml(m.name)+"</option>"; }).join("");
}

// 覆盖 updateModelSelects 加入 novelModel
var _origUpdateModelSelects = updateModelSelects;
updateModelSelects = function() {
    if (_origUpdateModelSelects) _origUpdateModelSelects();
    updateNovelModelSelect();
};

// ====== 初始化 ======
loadModels();
updateModelSelects();

})();
</script>
