<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄小说下载器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
        .header{background:linear-gradient(135deg,#ff6b35,#ff4444);color:#fff;padding:32px 20px;text-align:center}
        .header h1{font-size:28px;margin-bottom:8px}
        .header p{opacity:.85;font-size:14px}
        .header a{color:#fff}
        .container{max-width:720px;margin:0 auto;padding:20px}
        .card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .search-box{display:flex;gap:12px}
        .search-box input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none}
        .search-box input:focus{border-color:#ff6b35}
        .search-box button{padding:12px 28px;background:linear-gradient(135deg,#ff6b35,#ff4444);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
        .search-box button:disabled{opacity:.6;cursor:not-allowed}
        .mode-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:4px}
        .mode-badge.local{background:#11998e;color:#fff}
        .mode-badge.remote{background:#888;color:#fff}
        .book-item{display:flex;justify-content:space-between;align-items:center;padding:16px;border:2px solid #f0f0f0;border-radius:10px;margin-bottom:10px;cursor:pointer;transition:.2s}
        .book-item:hover{border-color:#ff6b35;background:#fff8f6}
        .book-item.selected{border-color:#ff6b35;background:#fff3ee}
        .book-title{font-size:16px;font-weight:600}
        .book-meta{font-size:13px;color:#888;margin-top:4px}
        .book-count{font-size:13px;color:#ff6b35;font-weight:600;white-space:nowrap}
        .dl-section{display:none}
        .dl-section.active{display:block}
        .dl-info{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .dl-info h2{font-size:18px}
        .dl-btns{display:flex;gap:8px}
        .btn{border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;padding:10px 22px;color:#fff}
        .btn:disabled{opacity:.6;cursor:not-allowed}
        .btn-dl{background:linear-gradient(135deg,#11998e,#38ef7d)}
        .btn-pause{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .btn-resume{background:linear-gradient(135deg,#4facfe,#00f2fe)}
        .progress{margin-top:20px}
        .progress-top{display:flex;justify-content:space-between;margin-bottom:8px}
        .progress-label{font-size:13px;color:#666}
        .progress-pct{font-size:18px;font-weight:700;color:#11998e}
        .progress-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin-bottom:10px}
        .progress-fill{height:100%;background:linear-gradient(90deg,#11998e,#38ef7d);border-radius:5px;transition:width .3s;width:0}
        .progress-detail{display:flex;gap:24px;font-size:13px;color:#888;flex-wrap:wrap}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff3;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .tip{font-size:12px;color:#aaa;margin-top:8px}
        .error{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:12px;border-radius:8px;margin-top:12px}
        .empty{text-align:center;color:#999;padding:40px}
    </style>
</head>
<body>

<div class="header">
    <h1>番茄小说下载器 <span class="mode-badge local" id="modeBadge" style="display:none">本地模式</span></h1>
    <p id="headerDesc">粘贴链接或搜索书名</p>
</div>

<div class="container">

    <div class="card">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="书名 / 章节链接 / book_id" autofocus>
            <button id="searchBtn" onclick="doSearch()">搜索</button>
        </div>
        <div class="tip" id="tipText">支持书名搜索或粘贴 fanqienovel.com 链接</div>
    </div>

    <div id="results"></div>

    <div class="card dl-section" id="dlSection">
        <div class="dl-info">
            <div>
                <h2 id="dlTitle"></h2>
                <div style="font-size:13px;color:#888;margin-top:4px" id="dlMeta"></div>
            </div>
            <div class="dl-btns" id="dlBtns"></div>
        </div>
        <div class="progress">
            <div class="progress-top"><span class="progress-label" id="progressLabel">准备中...</span><span class="progress-pct" id="progressPct">0%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-detail">
                <span id="detailChapters">章节: 0/0</span>
                <span id="detailSpeed">速度: --</span>
                <span id="detailETA">预计剩余: --</span>
                <span id="detailTime">已用时: 0s</span>
            </div>
        </div>
        <div id="dlError"></div>
    </div>

</div>

<script>
(function() {
'use strict';

// ====== 模式检测 ======
var isLocal = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ||
               window.location.hostname.indexOf('monkeycode-ai.online') !== -1);
if (isLocal) {
    $('modeBadge').style.display = 'inline-block';
    $('headerDesc').textContent = '搜索 + 下载整本 TXT（本地模式）';
    $('tipText').textContent = '本地 Python 代理直连所有 API，下载功能完整可用';
}

// CORS Proxy (仅 GitHub Pages 远程模式)
var CORS_PROXY = 'https://cool-tree-8fanqie.2137459298.workers.dev/?url=';

// ====== 状态 ======
var book = null;
var ids = [];
var state = 'idle';
var current = 0, total = 0, contentParts = [];
var startedAt = 0;
var pollTimer = null;
var sessionId = null;
var lastProgress = {t:0, n:0};

function $(id){ return document.getElementById(id); }

// ====== API 调用 ======
function apiGet(url) {
    return fetch(url).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    });
}

function localApi(path, params) {
    var qs = Object.keys(params || {}).map(function(k) {
        return k + '=' + encodeURIComponent(params[k]);
    }).join('&');
    return apiGet('/api' + path + (qs ? '?' + qs : ''));
}

function remoteFetch(url) {
    if (!CORS_PROXY) return Promise.reject(new Error('未配置代理'));
    var ctrl = new AbortController();
    var t = setTimeout(function(){ ctrl.abort(); }, 25000);
    return fetch(CORS_PROXY + encodeURIComponent(url), {signal: ctrl.signal}).then(function(r) {
        clearTimeout(t);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    }).catch(function(e) {
        clearTimeout(t);
        if (e.name === 'AbortError') throw new Error('请求超时');
        throw e;
    });
}

// ====== 搜索 ======
function doSearch() {
    var q = $('searchInput').value.trim();
    if (!q) return;
    var btn = $('searchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>搜索中';
    $('results').innerHTML = '';
    resetAll();

    if (isLocal) {
        // 本地模式: 使用 /api/resolve 或 /api/search
        localApi('/resolve', {q: q}).then(function(data) {
            if (data.book_id) {
                book = data;
                book.count = data.count || 0;
                total = book.count;
                localApi('/directory', {book_id: data.book_id}).then(function(d) {
                    ids = d.ids || [];
                    total = ids.length;
                    book.count = total;
                    showDownload();
                    $('results').innerHTML = '';
                    btn.disabled = false; btn.textContent = '搜索';
                }).catch(function(e) {
                    showDownload();
                    btn.disabled = false; btn.textContent = '搜索';
                });
            } else if (data.error) {
                // resolve 失败，尝试搜索
                localApi('/search', {q: q}).then(function(d) {
                    renderResults(d.books || []);
                    btn.disabled = false; btn.textContent = '搜索';
                }).catch(function(e) {
                    $('results').innerHTML = '<div class="error">搜索失败: ' + e.message + '</div>';
                    btn.disabled = false; btn.textContent = '搜索';
                });
            }
        }).catch(function() {
            localApi('/search', {q: q}).then(function(d) {
                renderResults(d.books || []);
                btn.disabled = false; btn.textContent = '搜索';
            }).catch(function(e) {
                $('results').innerHTML = '<div class="error">搜索失败: ' + e.message + '</div>';
                btn.disabled = false; btn.textContent = '搜索';
            });
        });
        return;
    }

    // 远程模式 (GitHub Pages)
    var idMatch = q.match(/(\d{16,20})/);
    if (idMatch) {
        resolveIdRemote(q, idMatch[1]).then(function(info) {
            if (info && info.book_id) {
                book = info;
                fetchDirRemote().then(function() { showDownload(); });
            } else if (info && info.error) {
                $('results').innerHTML = '<div class="error">' + info.error + '</div>';
            }
            btn.disabled = false; btn.textContent = '搜索';
        });
        return;
    }

    remoteFetch('https://novel.snssdk.com/api/novel/channel/homepage/search/search/v1/?aid=1967&q=' + encodeURIComponent(q) + '&offset=0').then(function(data) {
        var list = (data.data || {}).ret_data || [];
        if (!list.length) { $('results').innerHTML = '<div class="empty">未找到</div>'; btn.disabled = false; btn.textContent = '搜索'; return; }
        renderResults(list);
        list.forEach(function(b) { fetchCountRemote(b.book_id); });
        btn.disabled = false; btn.textContent = '搜索';
    }).catch(function(e) {
        $('results').innerHTML = '<div class="error">搜索失败: ' + e.message + '</div>';
        btn.disabled = false; btn.textContent = '搜索';
    });
}

// ====== 远程 resolve ======
function resolveIdRemote(q, id) {
    if (q.indexOf('/reader/') !== -1) {
        return fetch(CORS_PROXY + encodeURIComponent('https://fanqienovel.com/reader/' + id)).then(function(r) { return r.text(); }).then(function(html) {
            var m = html.match(/"bookId"\s*:\s*"(\d+)"/);
            if (m) {
                var tm = html.match(/"bookName"\s*:\s*"([^"]*)"/);
                return {book_id: m[1], title: tm ? tm[1] : ''};
            }
            return {book_id: null, error: '无法解析，请用书名搜索'};
        }).catch(function(e) {
            return {book_id: null, error: '无法连接: ' + e.message};
        });
    }
    return Promise.resolve({book_id: id});
}

function fetchDirRemote() {
    if (!book || !book.book_id) return Promise.resolve();
    $('results').innerHTML = '<div class="empty">加载中...</div>';
    return remoteFetch('https://fanqienovel.com/api/reader/directory/detail?bookId=' + book.book_id).then(function(data) {
        ids = (data.data && data.data.allItemIds) || [];
        total = ids.length;
        book.count = total;
        $('results').innerHTML = '';
    }).catch(function(e) {
        $('results').innerHTML = '<div class="error">加载目录失败: ' + e.message + '</div>';
    });
}

function fetchCountRemote(bookId) {
    remoteFetch('https://fanqienovel.com/api/reader/directory/detail?bookId=' + bookId).then(function(data) {
        var el = $('count-' + bookId);
        if (el) el.textContent = (data.data && data.data.allItemIds ? data.data.allItemIds.length : 0) + ' 章';
    }).catch(function() {});
}

// ====== 渲染搜索结果 ======
function renderResults(list) {
    var html = '';
    list.forEach(function(b) {
        var title = b.title || b.book_name || '';
        var author = b.author || '';
        var bid = b.book_id || '';
        html += '<div class="book-item" data-id="' + esc(bid) + '" data-title="' + esc(title) + '" data-author="' + esc(author) + '">' +
            '<div><div class="book-title">' + esc(title || bid) + '</div><div class="book-meta">' + esc(author) + '</div></div>' +
            '<div class="book-count" id="count-' + esc(bid) + '">...</div></div>';
    });
    $('results').innerHTML = html;

    if (isLocal) {
        list.forEach(function(b) {
            localApi('/directory', {book_id: b.book_id}).then(function(d) {
                var el = $('count-' + b.book_id);
                if (el) el.textContent = (d.total || 0) + ' 章';
            }).catch(function() {});
        });
    }
}

function selectBook(bookId, title, author) {
    document.querySelectorAll('.book-item').forEach(function(el){el.classList.remove('selected')});
    var items = document.querySelectorAll('.book-item[data-id="' + esc(bookId) + '"]');
    if (items.length) items[0].classList.add('selected');
    resetAll();
    book = {book_id: bookId, title: title, author: author};

    if (isLocal) {
        localApi('/directory', {book_id: bookId}).then(function(d) {
            ids = d.ids || [];
            total = ids.length;
            book.count = total;
            showDownload();
        }).catch(function(e) {
            $('results').innerHTML = '<div class="error">加载目录失败: ' + e.message + '</div>';
        });
    } else {
        ids = []; total = 0;
        remoteFetch('https://fanqienovel.com/api/reader/directory/detail?bookId=' + bookId).then(function(data) {
            ids = (data.data && data.data.allItemIds) || [];
            total = ids.length;
            book.count = total;
            showDownload();
        }).catch(function(e) {
            $('results').innerHTML = '<div class="error">加载目录失败: ' + e.message + '</div>';
        });
    }
}

function showDownload() {
    if (!book) return;
    $('dlTitle').textContent = book.title || book.book_id;
    $('dlMeta').textContent = (book.author ? book.author + ' | ' : '') + (total || book.count || 0) + ' 章';
    $('dlSection').classList.add('active');
    updateButtons();
}

// ====== 下载控制 ======
function resetAll() {
    current = 0; total = 0; contentParts = []; ids = [];
    state = 'idle'; sessionId = null;
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    $('progressFill').style.width = '0%';
    $('progressPct').textContent = '0%';
    $('progressLabel').textContent = '准备中...';
    $('detailChapters').textContent = '章节: 0/0';
    $('detailSpeed').textContent = '速度: --';
    $('detailETA').textContent = '预计剩余: --';
    $('detailTime').textContent = '已用时: 0s';
    $('dlSection').classList.remove('active');
    $('dlError').innerHTML = '';
    updateButtons();
}

function updateButtons() {
    var h = '';
    if (state === 'idle') h = '<button class="btn btn-dl" onclick="startDL()">下载整本 TXT</button>';
    else if (state === 'running') h = '<button class="btn btn-pause" onclick="doPause()">暂停</button>';
    else if (state === 'paused') {
        h = '<button class="btn btn-resume" onclick="doResume()">继续下载</button>';
        h += '<button class="btn btn-dl" onclick="saveFile()">完成并保存</button>';
    } else if (state === 'done') h = '<button class="btn btn-dl" onclick="saveFile()">保存 TXT 文件</button>';
    $('dlBtns').innerHTML = h;
}

function startDL() {
    if (!ids.length && !isLocal) { $('dlError').innerHTML = '<div class="error">请先搜索书籍</div>'; return; }
    state = 'running';
    current = 0; contentParts = [];
    startedAt = Date.now(); lastProgress = {t: startedAt, n:0};
    updateButtons();
    $('dlError').innerHTML = '';
    $('progressLabel').textContent = '下载中...';

    if (isLocal) {
        startLocalDL();
    } else {
        runWorker();
    }
}

function doPause() {
    state = 'paused';
    updateButtons();
    $('progressLabel').textContent = '已暂停 (' + current + '/' + total + ')';
    if (isLocal && sessionId) {
        localApi('/download/pause', {session_id: sessionId}).catch(function(){});
    }
}

function doResume() {
    state = 'running';
    startedAt = Date.now() - ((current / Math.max(lastProgress.n / Math.max((lastProgress.t - startedAt)/1000, 0.1), 1)) * 1000) || Date.now();
    updateButtons();
    $('progressLabel').textContent = '下载中...';
    if (isLocal && sessionId) {
        localApi('/download/resume', {session_id: sessionId}).catch(function(){});
        startLocalDL();
    } else {
        runWorker();
    }
}

function saveFile() {
    // 本地模式: 从服务端下载文件
    if (isLocal && sessionId) {
        fetch('/api/download/file?session_id=' + sessionId).then(function(r) {
            if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || '下载失败'); });
            return r.blob();
        }).then(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (book ? (book.title || book.book_id) : 'fanqie') + '.txt';
            a.click();
            setTimeout(function(){URL.revokeObjectURL(a.href)}, 2000);
        }).catch(function(e) {
            $('dlError').innerHTML = '<div class="error">保存失败: ' + e.message + '</div>';
        });
        return;
    }
    var text = contentParts.join('');
    var blob = new Blob(['\uFEFF' + text], {type: 'text/plain;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (book ? (book.title || book.book_id) : 'fanqie') + '.txt';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href)}, 2000);
}

// ====== 本地下载（服务端轮询）======
function startLocalDL() {
    localApi('/download/start', {book_id: book.book_id}).then(function(data) {
        sessionId = data.session_id;
        pollTimer = setInterval(pollStatus, 500);
    }).catch(function(e) {
        $('dlError').innerHTML = '<div class="error">启动下载失败: ' + e.message + '</div>';
        state = 'idle';
        updateButtons();
    });
}

function pollStatus() {
    if (!sessionId) return;
    localApi('/download/status', {session_id: sessionId}).then(function(data) {
        var s = data.status;
        current = data.current || 0;
        total = data.total || 0;

        if (s === 'done') {
            state = 'done';
            clearInterval(pollTimer); pollTimer = null;
            updateButtons();
            $('progressLabel').textContent = '下载完成！共 ' + total + ' 章';
            $('detailETA').textContent = '预计剩余: --';
            $('progressFill').style.width = '100%';
            $('progressPct').textContent = '100%';
        } else if (s === 'error') {
            state = 'idle';
            clearInterval(pollTimer); pollTimer = null;
            updateButtons();
            $('dlError').innerHTML = '<div class="error">下载出错</div>';
        } else if (s === 'paused') {
            if (state !== 'paused') { state = 'paused'; updateButtons(); }
            $('progressLabel').textContent = '已暂停 (' + current + '/' + total + ')';
        }
        updateProgress(data.elapsed || 0);
    }).catch(function() {});
}

// ====== 远程下载（客户端逐章请求）======
var lastFetchTime = 0;

function runWorker() {
    if (state !== 'running') return;

    function step() {
        if (state !== 'running') return;
        if (current >= total) {
            state = 'done';
            updateButtons();
            $('progressLabel').textContent = '下载完成！共 ' + total + ' 章';
            $('detailETA').textContent = '预计剩余: --';
            $('progressFill').style.width = '100%';
            $('progressPct').textContent = '100%';
            return;
        }

        var idx = current;
        var itemId = ids[idx];
        var now = Date.now();
        var wait = Math.max(0, 600 - (now - lastFetchTime));
        lastFetchTime = now + wait;

        setTimeout(function() {
            if (state !== 'running') return;

            remoteFetch('http://101.35.133.34:5000/api/content?tab=%E5%B0%8F%E8%AF%B4&item_id=' + itemId).then(function(data) {
                var text = (data.data && data.data.content) ? data.data.content : '[获取失败]';
                contentParts.push('\n\n第' + (idx + 1) + '章\n\n' + text);
                current++;
                updateProgress();
                step();
            }).catch(function(e) {
                contentParts.push('\n\n第' + (idx + 1) + '章\n\n[下载失败: ' + e.message + ']');
                current++;
                updateProgress();
                if (e.message.indexOf('403') !== -1) {
                    state = 'paused'; updateButtons();
                    $('progressLabel').textContent = '下载受阻 (第' + current + '/' + total + ')';
                    $('dlError').innerHTML = '<div class="error">代理 IP 被屏蔽，网页版暂不支持下载。请安装 <a href="https://raw.githubusercontent.com/scpxin/fanqie/master/userscript/fanqie.user.js" target="_blank">油猴脚本</a> 或用 <code>python3 server.py</code> 本地运行</div>';
                    return;
                }
                step();
            });
        }, wait);
    }
    step();
}

function updateProgress(elapsedOverride) {
    var pct = total > 0 ? Math.round(current / total * 100) : 0;
    $('progressFill').style.width = pct + '%';
    $('progressPct').textContent = pct + '%';
    $('detailChapters').textContent = '章节: ' + current + '/' + total;

    var elapsed = elapsedOverride || (Date.now() - startedAt) / 1000;
    $('detailTime').textContent = '已用时: ' + formatTime(elapsed);

    if (elapsed > 0 && current > 0) {
        $('detailSpeed').textContent = '速度: ' + (current / elapsed).toFixed(1) + ' 章/秒';
    }
    if (current > 0 && current < total) {
        var remaining = (total - current) / (current / elapsed);
        $('detailETA').textContent = '预计剩余: ' + formatTime(remaining);
    }
}

function formatTime(s) {
    if (s < 60) return Math.round(s) + 's';
    if (s < 3600) return Math.floor(s/60) + 'm' + Math.round(s%60) + 's';
    return Math.floor(s/3600) + 'h' + Math.floor((s%3600)/60) + 'm';
}

// ====== 事件 ======
$('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(); });

$('results').addEventListener('click', function(e) {
    var el = e.target.closest('.book-item');
    if (!el) return;
    selectBook(el.getAttribute('data-id'), el.getAttribute('data-title'), el.getAttribute('data-author'));
});
